<html>
<head>
  <title>Student Evaluation Form</title>
</head>

<body>
  <h3 align="center">
    <a href="#">Student Evaluation Form</a>
  </h3>

  <form>
    <table align="center" border="2" cellpadding="10" style="background-color:#eee2e2;">
      <tr>
        <td align="right" style="background-color:#5faaa8;">First Name:</td>
        <td><input type="text" placeholder="Enter Firstname"></td>
      </tr>

      <tr>
        <td align="right" style="background-color:#5faaa8;">Last Name:</td>
        <td><input type="text" placeholder="Enter Lastname"></td>
      </tr>

      <tr>
        <td align="right" style="background-color:#5faaa8;">Email:</td>
        <td><input type="email" placeholder="Enter Email"></td>
      </tr>

      <tr>
        <td align="right" style="background-color:#5faaa8;">Gender:</td>
        <td>
          <input type="radio" name="gender"> Male
          <input type="radio" name="gender"> Female
          <input type="radio" name="gender" checked> Other
        </td>
      </tr>

      <tr>
        <td align="right" style="background-color:#5faaa8;">Date Of Birth:</td>
        <td><input type="text" value="04/21/2036"></td>
      </tr>

      <tr>
        <td align="right" style="background-color:#5faaa8;">College Level:</td>
        <td>
          <select>
            <option>Freshman</option>
            <option>Sophomore</option>
            <option>Junior</option>
            <option>Senior</option>
          </select>
        </td>
      </tr>

      <tr>
        <td align="right" style="background-color:#5faaa8;">Upload Resume:</td>
        <td><input type="file"></td>
      </tr>

      <tr>
        <td align="right" style="background-color:#5faaa8;">Comment:</td>
        <td><textarea rows="5" cols="35">-</textarea></td>
      </tr>

      <tr>
        <td colspan="2" align="center">
          <input type="submit" value="SUBMIT">
        </td>
      </tr>
    </table>
  </form>

  <p align="center" style="background-color:#d8e68c;">
    Created By: Hermilo Hernandez Ramirez
  </p>
</body>
</html>
